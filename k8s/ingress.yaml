apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-pro-v2-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: api-gateway-pro-v2.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-pro-v2-service
            port:
              number: 80
